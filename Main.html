<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAINPAGE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Memory Card Game</h1>
    <div class="rules-box">
        <h2>Rules</h2>
        <ul>
            <li>Match pairs of cards to win!</li>
            <li>Rounds progress automatically after clearing.</li>
            <li>Each mismatch costs 1 life. You have 3 total.</li>
            <li>Higher rounds mean higher scores.</li>
        </ul>
    </div>
    <div class="button-container">
        <button class="start-button" onclick="start()">START</button>
        <button class="home-button" onclick="gohome()">BACK</button>
    </div>
    <script src="Game.js"></script>
    
</body>
</html>
